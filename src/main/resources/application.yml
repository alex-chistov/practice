server:
  port: 8080

spring:
  application:
    name: request-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:requests_db}
    username: ${DB_USER:requests_user}
    password: ${DB_PASSWORD:requests_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-secret-to-a-long-random-value-with-at-least-32-symbols}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:request-files}
