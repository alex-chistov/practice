services:
  postgres:
    image: postgres:16
    container_name: request-postgres
    environment:
      POSTGRES_DB: requests_db
      POSTGRES_USER: requests_user
      POSTGRES_PASSWORD: requests_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requests_user -d requests_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: request-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: request-app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: requests_db
      DB_USER: requests_user
      DB_PASSWORD: requests_password
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: request-files
      APP_JWT_SECRET: local-development-secret-value-with-more-than-32-symbols
      APP_JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  minio-data:
